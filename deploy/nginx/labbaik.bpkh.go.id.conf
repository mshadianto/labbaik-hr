# =============================================================
# Labbaik HR · Employee PWA
# Deploy: /etc/nginx/sites-available/labbaik.bpkh.go.id
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name labbaik.bpkh.go.id;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name labbaik.bpkh.go.id;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/labbaik.bpkh.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labbaik.bpkh.go.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (critical for GRC/ISO 27001)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), geolocation=(self), microphone=()" always;

    # CSP — allow Supabase, face-api.js models, Groq (via backend only)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://dstkhzgebjtwvsfykidt.supabase.co wss://dstkhzgebjtwvsfykidt.supabase.co https://api.labbaik.bpkh.go.id; media-src 'self' blob:; worker-src 'self' blob:;" always;

    root /var/www/labbaik.bpkh.go.id/dist;
    index index.html;

    # Face-api.js models — heavy files, cache aggressively
    location /models/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets hash-versioned by Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching of index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Client max body (for receipt uploads in future)
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
