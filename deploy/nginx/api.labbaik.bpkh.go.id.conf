# =============================================================
# Labbaik HR · API Backend (FastAPI)
# Deploy: /etc/nginx/sites-available/api.labbaik.bpkh.go.id
# =============================================================

upstream labbaik_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_heavy:10m rate=10r/s;

server {
    listen 80;
    server_name api.labbaik.bpkh.go.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.labbaik.bpkh.go.id;

    ssl_certificate     /etc/letsencrypt/live/api.labbaik.bpkh.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.labbaik.bpkh.go.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # CORS handled by FastAPI — don't duplicate here

    # Security
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Auth endpoints — strict rate limit
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://labbaik_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Heavy AI endpoint — moderate limit
    location /api/tanya-hr {
        limit_req zone=api_heavy burst=20 nodelay;
        proxy_pass http://labbaik_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;  # LLM may take time
    }

    # Everything else
    location / {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://labbaik_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Max upload (for face enrollment, receipt upload)
    client_max_body_size 10M;

    # Timeout
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
}
