# =============================================================
# Labbaik HR · Admin Dashboard (HR/Dewas only)
# Deploy: /etc/nginx/sites-available/admin.labbaik.bpkh.go.id
# =============================================================

server {
    listen 80;
    server_name admin.labbaik.bpkh.go.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.labbaik.bpkh.go.id;

    ssl_certificate     /etc/letsencrypt/live/admin.labbaik.bpkh.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.labbaik.bpkh.go.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ====================================================
    # IP ALLOWLIST - restrict admin access to BPKH office
    # Ganti dengan range IP gedung BPKH / VPN BPKH.
    # Hapus/komentari jika admin harus bisa diakses remote.
    # ====================================================
    # allow 103.xx.xx.0/24;  # BPKH office IP range
    # allow 10.0.0.0/8;       # BPKH internal VPN
    # deny all;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin" always;

    root /var/www/admin.labbaik.bpkh.go.id/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
